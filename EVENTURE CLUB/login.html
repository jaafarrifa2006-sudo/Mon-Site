<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Club Eventure • Connexion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
<div class="container header-inner">
<a class="brand" href="index.html"><img src="logo_ev_white-removebg-preview (1).png" alt="logo" width="360px"></a>
</div>
</header>

<main class="container auth-page">
<div class="auth-card glass">
<div class="auth-header reveal">
<h1 style="background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:0 0 0.5rem 0">🔓 Bienvenue au club</h1>
<p style="color:#d4af37;font-size:0.9rem;margin:0;letter-spacing:0.5px">Connecte-toi pour accéder aux événements</p>
</div>

<form id="loginForm" class="form" novalidate>
<div class="form-row reveal reveal-delay-1">
<label for="emailLogin">📧 Email</label>
<input id="emailLogin" name="email" type="email" placeholder="ton.email@example.com" required>
<span class="form-helper"></span>
</div>

<div class="form-row reveal reveal-delay-2">
<label for="passwordLogin">🔐 Mot de passe</label>
<input id="passwordLogin" name="password" type="password" placeholder="Ton mot de passe sécurisé" minlength="6" required>
<span class="form-helper">Au moins 6 caractères</span>
</div>

<div class="form-actions reveal reveal-delay-3">
<button class="btn" type="submit">✨ Se connecter</button>
</div>

<p class="form-footer" style="text-align:center;color:#999;margin-top:1.5rem">
Pas encore membre ? <a href="register.html" style="color:#d4af37;text-decoration:none;font-weight:600;border-bottom:2px solid #d4af37;padding-bottom:2px">S'inscrire gratuitement</a>
</p>

<p id="loginFeedback" class="form-feedback" aria-live="polite"></p>
</form>
</div>
</main>

<footer class="site-footer">
<div class="container footer-inner">
<p>© <span id="year4"></span> Club Eventure — FSJES Ain Chock.</p>
</div>
</footer>

<style>
.auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 200px);padding:2rem 0}
.auth-card{max-width:450px;width:100%;padding:2.5rem;border-radius:20px;animation:slide-up 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
.auth-header{text-align:center;margin-bottom:2rem;border-bottom:1px solid rgba(212,175,55,0.2);padding-bottom:1.5rem}
.form-row{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem}
.form-row label{font-weight:600;font-size:0.95rem;color:#f5f5f5;letter-spacing:0.3px}
.form-row input,.form-row select{background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,175,55,0.2);color:#f5f5f5;padding:0.8rem 1rem;border-radius:10px;font-size:1rem;transition:var(--transition-smooth);font-family:inherit}
.form-row input::placeholder,.form-row select::placeholder{color:rgba(245,213,71,0.5)}
.form-row input:focus,.form-row select:focus{background:rgba(255,255,255,0.08);border-color:rgba(212,175,55,0.6);box-shadow:0 0 20px rgba(212,175,55,0.3),inset 0 0 10px rgba(212,175,55,0.1);outline:none}
.form-helper{font-size:0.8rem;color:rgba(212,175,55,0.7);margin-top:-0.3rem;display:block}
.form-actions{display:flex;gap:1rem;margin-top:2rem}
.form-actions .btn{flex:1;padding:1rem;font-size:1rem;font-weight:600;border-radius:10px;transition:var(--transition-smooth)}
.form-footer{font-size:0.9rem}
.form-footer a:hover{text-shadow:0 0 10px rgba(212,175,55,0.6)}
.form-feedback{text-align:center;margin-top:1rem;padding:0.8rem;border-radius:8px;font-size:0.9rem}
.form-feedback.success{background:rgba(76,175,80,0.2);color:#4caf50;border:1px solid rgba(76,175,80,0.4)}
.form-feedback.error{background:rgba(244,67,54,0.2);color:#f44336;border:1px solid rgba(244,67,54,0.4)}
@media (max-width:600px){.auth-page{min-height:100vh}.auth-card{padding:1.5rem;margin:1rem}}
</style>

</body>
</html>
